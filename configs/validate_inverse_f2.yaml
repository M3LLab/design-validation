# Full-triangle pixel-level validation of the INVERSE-designed (neural-field)
# cloak @ f*=2.0. Paths are relative to the repo root (design_validation/).

fem_config:   configs/fem_base.yaml          # FEM setup (geometry, PML, source, TRI6)
params:       data/optimized_params.npz       # optimiser output (per-cell homogenised C)
cell_designs: data/cell_designs_inverse       # neural-field cement/void cells (canvas.npy per cell)

f_star:       2.0            # normalised frequency
mesh_voids:   remove         # pores = traction-free holes (only solid cement meshed)
void_ratio:   1.0e-6         # only used when mesh_voids: weak
output_dir:   output_inverse

# Direct solver for BOTH the reference and the pixel solve. 'umfpack' (scipy
# SuperLU) aborts with "Not enough memory to perform factorization" above ~1M DOF
# (int32 indexing, not physical RAM); 'petsc' = MUMPS, required at refinement 50.
solver:       petsc

# Mesh fineness. Node count grows ~linearly in this factor (distance-graded size
# fields), not quadratically:  25 -> 0.70M nodes / 2.8M DOF;  50 -> 1.21M nodes /
# 4.9M DOF (~1.2 elements per micro-pixel). See README "Convergence".
refinement_factor: 50
