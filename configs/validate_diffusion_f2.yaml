# Full-triangle pixel-level validation of the diffusion-designed cloak @ f*=2.0.
# Paths are relative to the repo root (design_validation/).

fem_config:   configs/fem_base.yaml          # FEM setup (geometry, PML, source, TRI6)
params:       data/optimized_params.npz       # optimiser output (per-cell homogenised C)
cell_designs: data/cell_designs_diffusion     # generated cement/void cells (canvas.npy per cell)

f_star:       2.0            # normalised frequency
output_dir:   output

# How the microstructure pores are modelled:
#   remove (default, physically correct) — cut the void pixels out of the mesh so
#          the pores are genuine traction-free holes; only the solid cement is
#          discretised (standard FEM practice for perforated / auxetic media).
#          Halves the DOF in the cloak and removes the spurious weak-material
#          modes that blow up max|u|/p95.
#   weak  — legacy ersatz fill: mesh the pores with soft material E_void/E_cement
#          = void_ratio. Kept only for A/B comparison against the old results.
mesh_voids:   remove
void_ratio:   1.0e-6         # only used when mesh_voids: weak

# Direct solver for BOTH the reference and the pixel solve.
#   umfpack -> scipy spsolve (SuperLU). Dies with "Not enough memory to perform
#              factorization" (int32 indexing, not real RAM) above ~1M DOF, i.e.
#              already at refinement_factor ~15 — regardless of physical RAM.
#   petsc   -> MUMPS via PETSc (nested dissection): the only workable option at
#              refinement 50. ~2x faster and factorises where SuperLU aborts.
solver:       petsc

# Mesh fineness. This is the knob that decides whether the microstructure is
# resolved. The mesh-size fields are distance-graded, so node count grows roughly
# LINEARLY in this factor, not quadratically (measured, TRI6, 4 DOF/node):
#   25 -> 0.70M nodes / 2.8M DOF  (~0.6 element per micro-pixel)
#   50 -> 1.21M nodes / 4.9M DOF  (~1.2 elements per micro-pixel; h=1.15e-3 vs pixel 1.33e-3)
# Start low, raise it and watch u_ratio converge (see README "Convergence").
refinement_factor: 50
