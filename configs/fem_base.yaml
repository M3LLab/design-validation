is_reference: false
geometry_type: triangular

material:
  rho0: 1600.0
  cs: 300.0

domain:
  f_star: 2.0
  lambda_star: 1.0
  H_factor: 4.305
  W_factor: 12.5

geometry:
  a_factor: 0.0774
  b_factor: 3.0
  c_factor: 0.1545

absorbing:
  L_pml_factor: 1.0
  xi_max: 4.0
  pml_pow: 2

mesh:
  n_pml_x: 32
  n_pml_y: 32
  nx_phys: 100
  ny_phys: 60
  refinement_factor: 5
  ele_type: TRI6

source:
  x_src_factor: 0.05
  sigma_factor: 0.01
  F0: 1.0

solver:
  ksp_type: preonly
  pc_type: lu

cells:
  enabled: true
  init: dataset_centroid
  init_path: dataset/gmm_flat4.npz
  n_x: 20
  n_y: 15
  n_C_params: 4
  symmetrize_init: false

loss:
  type: magnitude_band_integral
  depth: 0.5
  regularizations:
    material_cement_GMM:
      enabled: true
      path: dataset/gmm_flat4.npz
      weight: 0.1
      quantile: 0.25

# loss:
#   type: top_surface
#   n_points: 200

optimization:
  method: neural
  n_iters: 2000
  lr: 0.0005
  lr_end: 0.00001
  lr_schedule: cosine
  lambda_l2: 0.0
  lambda_neighbor: 0.0
  plot_every: 10
  neural:
    #init_weights: ""   # no prior run yet; start from a fresh MLP
    hidden_size: 512
    n_layers: 6
    n_fourier: 64
    seed: 42
    output_scale: 0.1
    constrained: True
    kappa: 0.95
    cap_anisotropy: True
    anisotropy_ratio: 12.0

output_dir: output
